name: Code coverage (PR)

on:
  pull_request_target:
    paths:
      - ytmusicapi/**
      - tests/**

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    # Static environment name — GitHub reliably enforces required reviewers here.
    # Configure the 'coverage' environment in Settings → Environments with
    # required reviewers and "Allow self-reviews" to gate this job on PRs.
    environment: coverage
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
        fetch-depth: 1
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.10"
    - name: Setup PDM
      uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0  # v4.4
    - name: Write OAuth credentials
      env:
        OAUTH_JSON: ${{ secrets.OAUTH_JSON }}
      run: printf '%s\n' "$OAUTH_JSON" > tests/oauth.json
    - name: Install dependencies
      run: pdm install
    - name: Generate coverage report
      env:
        HEADERS_AUTH: ${{ secrets.HEADERS_AUTH }}
        TEST_CFG: ${{ secrets.TEST_CFG }}
      run: |
        curl -fsSL -o tests/test.mp3 https://www.kozco.com/tech/piano2-CoolEdit.mp3
        printf '%s\n' "$HEADERS_AUTH" > tests/browser.json
        printf '%s\n' "$TEST_CFG" > tests/test.cfg
        pdm run pytest --junitxml=test-results.xml
        pdm run coverage xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
      if: ${{ !cancelled() }}
      with:
        flags: unittests
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3  # v1.2.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: test-results.xml
